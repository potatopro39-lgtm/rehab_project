<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - Exo Rehab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); height: 100vh; }
        .login-card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="card login-card bg-white p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success m-0"><i class="fa-solid fa-robot me-2"></i>Exo Rehab</h2>
            <small class="text-muted fw-bold">HỆ THỐNG PHỤC HỒI CHỨC NĂNG HAI CHÂN</small>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 text-center" style="font-size: 0.9rem;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold small text-secondary">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập..." required autocomplete="off">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold small text-secondary">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu..." required>
                </div>
            </div>
            <button type="submit" class="btn btn-success fw-bold w-100 py-2 shadow-sm">
                ĐĂNG NHẬP <i class="fa-solid fa-right-to-bracket ms-1"></i>
            </button>
        </form>
        
        <div class="text-center mt-3">
            <small class="text-muted">Mẹo test nhanh: Nhập tài khoản <b>admin</b> / mật khẩu <b>admin</b></small>
        </div>
    </div>

</body>
</html>
